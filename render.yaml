services:
  - type: web
    name: skill-swap
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt ; python manage.py collectstatic --noinput ; python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT skill_swap.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: skill-swap-db
          property: connectionString

databases:
  - name: skill-swap-db
    plan: free
